<div class="truck-container" *appHasPermission="'logistics.view_truck'">
  <div class="page-header">
    <div class="header-content">
      <div class="header-left">
        <h1>{{ 'TRUCK.TITLE' | translate }}</h1>
        <div class="breadcrumb">
          <span>{{ 'MENU.HOME' | translate }}</span>
          <span class="separator">/</span>
          <span class="active">{{ 'TRUCK.VEHICLES' | translate }}</span>
        </div>
      </div>
    </div>
  </div>

  <div class="content-section" [class.loading]="isLoading">
    <app-generic-table
      [service]="truckService"
      [displayedColumns]="displayedColumns"
      [filterableColumns]="filterableColumns"
      [columnDefinitions]="columnDefinitions"
      [title]="'TRUCK.VEHICLES' | translate"
      [showRowNumbers]="true"
      [columnTypes]="columnTypes"
      [deletePermission]="['logistics.delete_truck']"
      [addPermission]="['logistics.add_truck']"
      [updatePermission]="['logistics.change_truck']"
      [columnPermissions]="{
        'created_at': ['access_control.view_audited_fields'],
        'created_by': ['access_control.view_audited_fields']
      }">
    </app-generic-table>
  </div>
</div>
